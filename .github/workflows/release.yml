name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Job 1: 创建 GitHub Release（包含 exe 文件）
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package executables
        run: |
          npm install -D @yao-pkg/pkg
          npx pkg dist/cli.js --targets node18-win-x64,node18-linux-x64,node18-macos-x64 --output dist/dmcli
          # 重命名文件以便识别
          mv dist/dmcli-win-x64.exe dist/dmcli-windows-x64.exe
          mv dist/dmcli-linux-x64 dist/dmcli-linux-x64
          mv dist/dmcli-macos-x64 dist/dmcli-macos-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/dmcli-*.exe
            dist/dmcli-linux-x64
            dist/dmcli-macos-x64
            dist/cli.js

  # Job 2: 发布到 npm（独立运行，不影响 GitHub Release）
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
